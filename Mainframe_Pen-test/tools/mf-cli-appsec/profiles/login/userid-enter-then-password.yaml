# Some panels require Enter after userid before the password field appears.
id: userid-enter-then-password
name: Userid + Enter, then Password + Enter
platforms:
  - generic-tn3270
  - ibm-zos
  - session-manager
steps:
  - action: string
    text: "{{user}}"
  - action: enter
  - action: pause
    ms: 400
  - action: string
    text: "{{password}}"
  - action: enter
