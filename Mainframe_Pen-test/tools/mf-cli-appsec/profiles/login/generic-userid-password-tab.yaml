# Global default logon: USERID field → Tab → PASSWORD field → Enter
# Works on many TSO, session-manager, and custom 3270 logon panels worldwide.
id: generic-userid-password-tab
name: Userid + Tab + Password + Enter
platforms:
  - generic-tn3270
  - ibm-zos
  - ibm-zvm
  - ibm-zvse
  - session-manager
  - cics
  - tso-ispf
description: >
  Most common TN3270 logon pattern. If your site uses a different field order,
  copy this file and adjust steps (extra tabs, PF keys, clear, etc.).
steps:
  - action: string
    text: "{{user}}"
  - action: tab
  - action: string
    text: "{{password}}"
  - action: enter
